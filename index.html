<!DOCTYPE html>
<html lang="nl">

<head>
  <meta content="text/html; charset=utf-8" http-equiv="content-type">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <script src="https://cdn.jsdelivr.net/gh/digitalbazaar/respec-mermaid@1.0.1/dist/main.js" class="remove"></script>
  <script src="https://tools.geostandaarden.nl/respec/config/geonovum-config.js" class="remove"></script>
  <script src="js/config.js" class="remove"></script>
  <script class="remove">
    const mergedLocalBiblio = {
      ...organisationConfig.localBiblio,
      ...respecConfig.localBiblio
    };
    respecConfig = {
      ...organisationConfig,
      ...respecConfig,
      localBiblio: mergedLocalBiblio
    };
  </script>

  <title>Dashboard Geonovum informatiemodellen</title>
  <script>document.title = respecConfig.title</script>

  <!-- favicon -->
  <link rel="shortcut icon" type="image/x-icon" href="https://tools.geostandaarden.nl/respec/style/logos/Geonovum.ico" />

  <script src="https://gitdocumentatie.logius.nl/publicatie/respec/builds/respec-nlgov.js" class="remove" async></script>

  <!-- De volgende regel zorgt ervoor dat plaatjes uit Imvertor niet geschaald
       worden, zodat de imagemap die op deze plaatjes zit werkt. -->
  <style>div.imageinfo img {max-width: none;}</style>
  <style>
    :root {
      --dashboard-border: #d7dde5;
      --dashboard-surface: #f7f9fb;
      --dashboard-text-muted: #58677a;
      --dashboard-green: #146c43;
      --dashboard-green-bg: #e7f4ec;
      --dashboard-yellow: #8a5b00;
      --dashboard-yellow-bg: #fff3cd;
      --dashboard-red: #9f1239;
      --dashboard-red-bg: #ffe4e6;
      --dashboard-blue: #0b5cab;
      --dashboard-blue-bg: #e8f2ff;
    }

    body {
      line-height: 1.55;
    }

    body > section {
      margin-block: 2rem;
    }

    table {
      display: block;
      max-width: 100%;
      max-height: 72vh;
      overflow: auto;
      border: 1px solid var(--dashboard-border);
      border-radius: 6px;
      background: white;
      font-size: .88rem;
      box-shadow: inset -12px 0 12px -14px rgba(31, 41, 55, .45);
    }

    table thead th,
    table tr:first-child th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: var(--dashboard-surface);
      color: #1f2937;
      border-bottom: 1px solid var(--dashboard-border);
    }

    th,
    td {
      vertical-align: top;
      padding: .45rem .55rem;
    }

    th {
      color: #1f2937;
      font-weight: 700;
    }

    td {
      max-width: 34rem;
    }

    td a {
      overflow-wrap: anywhere;
    }

    .dashboard-kpis {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(10rem, 1fr));
      gap: .75rem;
      margin-block: 1rem 1.5rem;
    }

    .dashboard-kpis > div {
      border: 1px solid var(--dashboard-border);
      border-radius: 6px;
      padding: .85rem 1rem;
      background: var(--dashboard-surface);
    }

    .dashboard-kpis strong {
      display: block;
      font-size: 1.65rem;
      line-height: 1.1;
    }

    .dashboard-kpis span {
      color: var(--dashboard-text-muted);
      font-size: .88rem;
    }

    .dashboard-badge {
      display: inline-block;
      min-width: 2.4rem;
      border-radius: 999px;
      padding: .1rem .5rem;
      font-size: .78rem;
      font-weight: 700;
      line-height: 1.4;
      text-align: center;
      white-space: nowrap;
    }

    .dashboard-badge--success {
      color: var(--dashboard-green);
      background: var(--dashboard-green-bg);
    }

    .dashboard-badge--attention,
    .dashboard-badge--warning {
      color: var(--dashboard-yellow);
      background: var(--dashboard-yellow-bg);
    }

    .dashboard-badge--danger {
      color: var(--dashboard-red);
      background: var(--dashboard-red-bg);
    }

    .dashboard-badge--neutral {
      color: var(--dashboard-blue);
      background: var(--dashboard-blue-bg);
    }

    .dashboard-table-filter {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: .5rem .75rem;
      margin-block: .75rem .35rem;
      color: var(--dashboard-text-muted);
      font-size: .88rem;
    }

    .dashboard-table-filter input {
      min-width: min(100%, 18rem);
      border: 1px solid var(--dashboard-border);
      border-radius: 6px;
      padding: .35rem .5rem;
      font: inherit;
      color: #1f2937;
      background: white;
    }

    .dashboard-table-filter input:focus {
      outline: 2px solid var(--dashboard-blue);
      outline-offset: 2px;
    }

    .sidelabel {
      color: white !important;
      background: #245c0d !important;
    }
  </style>
</head>

<body>
<section id="abstract" data-include-format="markdown" data-include="abstract.md"></section>
<section id="sotd"></section><!-- Wordt automatisch gevuld -->

<section data-include-format="markdown" data-include="dashboardoverzicht.md"></section>
<section data-include-format="markdown" data-include="informatiemodellen.md"></section>
<section data-include-format="markdown" data-include="conceptenbibliotheken.md"></section>
<section data-include-format="markdown" data-include="svn.md"></section>
<section data-include-format="markdown" data-include="respecdocuments.md"></section>
<section data-include-format="markdown" data-include="githubrepos.md"></section>
<section data-include-format="markdown" data-include="brokenlinks.md"></section>

<script>
  (function () {
    function initDashboardTableFilters() {
      document.querySelectorAll("table").forEach(function (table, index) {
        var bodyRows = Array.from(table.querySelectorAll("tbody tr"));
        if (bodyRows.length <= 20) {
          return;
        }

        var wrapper = table.previousElementSibling;
        var input;
        var counter;

        if (wrapper && wrapper.classList.contains("dashboard-table-filter")) {
          input = wrapper.querySelector("input");
          counter = wrapper.querySelector("span");
        } else {
          wrapper = document.createElement("div");
          wrapper.className = "dashboard-table-filter";

          var label = document.createElement("label");
          var inputId = "dashboard-table-filter-" + index;
          label.setAttribute("for", inputId);
          label.textContent = "Filter tabel";

          input = document.createElement("input");
          input.id = inputId;
          input.type = "search";
          input.placeholder = "Typ om rijen te filteren";

          counter = document.createElement("span");
          counter.setAttribute("aria-live", "polite");

          wrapper.append(label, input, counter);
          table.parentNode.insertBefore(wrapper, table);
        }

        table.dataset.dashboardFilterReady = "true";

        function updateRows() {
          var query = input.value.trim().toLowerCase();
          var visible = 0;
          bodyRows.forEach(function (row) {
            var match = !query || row.textContent.toLowerCase().indexOf(query) !== -1;
            row.hidden = !match;
            if (match) {
              visible += 1;
            }
          });
          counter.textContent = visible + " / " + bodyRows.length + " rijen";
        }

        input.oninput = updateRows;
        updateRows();
      });
    }

    if (document.respec && document.respec.ready) {
      document.respec.ready.then(initDashboardTableFilters);
    }
    window.addEventListener("load", function () {
      window.setTimeout(initDashboardTableFilters, 0);
    });
  }());
</script>

<!-- De volgende paragrafen worden automatisch gevuld. Je kunt ze uitzetten -->
<section id='tof'></section><!-- Lijst van figuren -->
</body>

</html>
